name: ElytraPVP
version: '${project.version}'
main: me.roustytousty.elytrapvp.ElytraPVP
api-version: '1.21'

dependencies:
  server:
    DecentHolograms:
      load: BEFORE
      required: true



commands:

  test:
    description: "Test command for Rousty!"

  # Gui commands
  upgrademenu:
    description: "Opens the upgrade GUI"
  shopmenu:
    description: "Opens the shop GUI"
  statsmenu:
    description: "Opens the stats GUI"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  perksmenu:
    description: "Opens the perks GUI"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  eventsmenu:
    description: "Opens the events GUI"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  rebirthmenu:
    description: "Opens the rebirth GUI"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"

  # Player commands
  gold:
    aliases: [money, bal, balance]
    description: "Check how much gold you have!"
  stats:
    description: "Opens specific players stats!"
  discord:
    aliases: [dc]
    description: "Sends an invite link to discord!"
  spawn:
    aliases: [hub, lobby, s]
    description: "Teleports you to spawn!"

  # Staff commands
  reloadupgradeconfig:
    description: "Reloads the upgrade config!"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  reloadshopconfig:
    description: "Reloads the shop config!"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  buildmode:
    description: "Toggles buildmode!"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  feed:
    description: "Feeds you!"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  setgold:
    description: "Set players gold amount!"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  setkitlevel:
    description: "Set players kit level!"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  eventactivate:
    description: "Activates a specific event!"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"
  mapreset:
    description: "Resets the map!"
    permission: op
    permission-message: "&c&lEcoWings &8| &fYou don't have permission to use this command!"